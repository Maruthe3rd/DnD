<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resources</title>
  <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>

<a href="../CLICKME.html" class="return-home-btn" aria-label="Return to homepage">⌂</a>

<div class="content">
  <h1>Resources</h1>
  <p>Hier sind alle wichtigen Resourcen für die Kampagne sortiert.</p>


  <search>
  <label>
    Suche:
    <input type="search" id="query" autocomplete="on" placeholder="Hier Datei etc. eingeben" />
  </label>
  <label>
    <input type="checkbox" id="exact-only" />
    Nur exakte Treffer anzeigen
  </label>

  <section>
    <h3>Ergebnis:</h3>
    <p id="no-results" hidden>Keine Treffer gefunden.</p>
  </section>
</search>

<!-- List with all files -->
    <ul id="resource-list">
        <li><a href="../Resources/CharSheet.pdf" target="_blank">Character Sheet PDF</a></li>
    </ul>

</div>

<!-- 
<script src="../JS/Skilltree.js"></script> 
-->

<script>
  const queryInput = document.getElementById('query');
  const exactOnly = document.getElementById('exact-only');
  const resourceList = document.getElementById('resource-list');
  const noResults = document.getElementById('no-results');

  function filterResources() {
    const query = queryInput.value.trim().toLowerCase();
    const items = resourceList.querySelectorAll('li');
    let visibleCount = 0;

    items.forEach((item) => {
      const text = item.textContent.trim().toLowerCase();
      const matches = exactOnly.checked ? text === query : text.includes(query);
      item.hidden = query ? !matches : false;
      if (!item.hidden) visibleCount += 1;
    });

    noResults.hidden = visibleCount > 0;
  }

  queryInput.addEventListener('input', filterResources);
  exactOnly.addEventListener('change', filterResources);
  filterResources();
</script>

</body>
</html>
